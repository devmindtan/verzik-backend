info:
  name: cosign-operator-config
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/cosign-operator-config?tenantId={{tenant_id}}&docType=1&operator={{operator}}"
  params:
    - name: tenantId
      value: "{{tenant_id}}"
      type: query
    - name: docType
      value: "1"
      type: query
    - name: operator
      value: "{{operator}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
