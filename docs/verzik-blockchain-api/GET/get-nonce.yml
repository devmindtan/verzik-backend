info:
  name: get-nonce
  type: http
  seq: 2

http:
  method: GET
  url: "{{base_url}}/nonce?tenantId={{tenant_id}}&signer={{operator}}"
  params:
    - name: tenantId
      value: "{{tenant_id}}"
      type: query
    - name: signer
      value: "{{operator}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
